name: Release

on:
  release:
    types: [created]

jobs:
  docs:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout fractions-simple
        uses: actions/checkout@v4
        with:
          repository: luk036/fractions-simple
          path: fractions-simple

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and build (release)
        run: |
          xmake f -y -m release
          xmake

      - name: Run tests
        run: xmake run test_rattrig

      - name: Generate Doxygen documentation
        run: xmake doxygen

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/doxygen/html

  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
